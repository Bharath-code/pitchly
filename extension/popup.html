<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitchly</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">Pitchly</span>
      </div>
      <span id="status-badge" class="status-badge status-idle" aria-live="polite">Idle</span>
    </div>

    <!-- Main Action -->
    <button id="start-stop-btn" class="start-stop-btn" aria-label="Start listening on this call">
      <span class="btn-content">
        <span class="btn-icon" id="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </span>
        <span id="btn-text">Start Listening</span>
      </span>
    </button>

    <!-- Audio Mode -->
    <div class="info-row" aria-live="polite">
      <span class="info-label">Audio Source</span>
      <span id="audio-mode-badge" class="mode-badge" style="display:none;" aria-label="Current audio capture mode"></span>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Settings Section -->
    <div class="settings-section">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <span class="settings-hint">Used for post-call summary</span>
      </div>

      <div class="config-section">
        <label for="worker-host" class="config-label">Worker URL</label>
        <input
          id="worker-host"
          type="text"
          class="config-input"
          placeholder="your-worker.workers.dev"
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <div class="config-section">
        <label for="rep-email" class="config-label">Your Email</label>
        <input
          id="rep-email"
          type="email"
          class="config-input"
          placeholder="sarah@company.com"
          spellcheck="false"
          autocomplete="email"
        />
      </div>

      <div class="config-section">
        <label for="manager-email" class="config-label">Manager Email <span class="config-optional">(optional)</span></label>
        <input
          id="manager-email"
          type="email"
          class="config-input"
          placeholder="mike@company.com"
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <div class="config-section">
        <label for="webhook-url" class="config-label">Webhook URL <span class="config-optional">(optional)</span></label>
        <input
          id="webhook-url"
          type="text"
          class="config-input"
          placeholder="https://hooks.zapier.com/..."
          spellcheck="false"
          autocomplete="off"
        />
        <span class="config-hint">Zapier, Make, or any HTTP endpoint</span>
      </div>

      <button id="save-settings-btn" class="save-settings-btn" aria-label="Save settings">
        Save Settings
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-dot"></span>
      <span>Real-time objection coaching</span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
