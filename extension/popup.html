<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitchly</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">Pitchly</span>
      </div>
      <span id="status-badge" class="status-badge status-idle" aria-live="polite">Idle</span>
    </div>

    <!-- Main Action -->
    <button id="start-stop-btn" class="start-stop-btn" aria-label="Start listening on this call">
      <span class="btn-content">
        <span class="btn-icon" id="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </span>
        <span id="btn-text">Start Listening</span>
      </span>
    </button>

    <!-- Audio Mode -->
    <div class="info-row" aria-live="polite">
      <span class="info-label">Audio Source</span>
      <span id="audio-mode-badge" class="mode-badge" style="display:none;" aria-label="Current audio capture mode"></span>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Worker Host Config -->
    <div class="config-section">
      <div class="config-header">
        <label for="worker-host" class="config-label">Worker URL</label>
      </div>
      <input
        id="worker-host"
        type="text"
        class="config-input"
        placeholder="your-worker.workers.dev"
        spellcheck="false"
        autocomplete="off"
      />
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-dot"></span>
      <span>Real-time objection coaching</span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
